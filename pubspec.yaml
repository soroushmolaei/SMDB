name: smdb
description: "Personal movie & TV show library manager (Windows desktop)"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Local database
  drift: ^2.34.1
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.6
  path: ^1.9.0

  # State management
  flutter_riverpod: ^2.5.1

  # Networking & images
  http: ^1.2.2
  cached_network_image: ^3.4.1

  # Folder/file picking (desktop)
  file_picker: ^8.3.7

  # External links (IMDb, Rotten Tomatoes)
  url_launcher: ^6.3.1

  # Formatting helpers
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.34.2
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
