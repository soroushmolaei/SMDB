name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Scaffold Windows platform folder
        run: flutter create --platforms=windows .

      - name: Get packages
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze (non-blocking)
        run: flutter analyze
        continue-on-error: true

      - name: Build Windows release
        run: flutter build windows --release

      - name: Locate and zip build output
        shell: pwsh
        run: |
          $ws = $env:GITHUB_WORKSPACE
          Write-Host "Workspace: $ws"
          $buildWindows = Join-Path $ws "build\windows"

          $exe = Get-ChildItem -Path $buildWindows -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like "*\runner\Release\*" } |
            Select-Object -First 1

          if (-not $exe) {
            Write-Error "Could not find a built .exe under build\windows\...\runner\Release"
            Write-Host "All .exe files found under build\windows:"
            Get-ChildItem -Path $buildWindows -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue |
              ForEach-Object { Write-Host " - $($_.FullName)" }
            exit 1
          }

          $releaseDir = $exe.DirectoryName
          Write-Host "Found release dir: $releaseDir"
          Get-ChildItem -Path $releaseDir -Recurse | ForEach-Object { Write-Host " - $($_.FullName)" }

          $zipPath = Join-Path $ws "SMDB-Windows.zip"
          Compress-Archive -Path (Join-Path $releaseDir "*") -DestinationPath $zipPath -Force

          if (-not (Test-Path $zipPath)) {
            Write-Error "Zip file was not created at $zipPath"
            exit 1
          }
          $size = (Get-Item $zipPath).Length
          Write-Host "Created zip at $zipPath ($size bytes)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SMDB-Windows
          path: ${{ github.workspace }}\SMDB-Windows.zip
          if-no-files-found: error
          retention-days: 30
