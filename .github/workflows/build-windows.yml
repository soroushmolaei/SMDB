name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Scaffold Windows platform folder
        run: flutter create --platforms=windows .

      - name: Get packages
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze (non-blocking)
        run: flutter analyze
        continue-on-error: true

      - name: Build Windows release
        run: flutter build windows --release

      - name: Locate and zip build output
        shell: pwsh
        run: |
          $ws = $env:GITHUB_WORKSPACE
          Write-Host "Workspace: $ws"
          $releaseDir = Get-ChildItem -Path (Join-Path $ws "build\windows") -Recurse -Directory -Filter "Release" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $releaseDir) {
            Write-Error "Could not find a Release output folder under build\windows"
            Write-Host "Contents of build\windows (if any):"
            Get-ChildItem -Path (Join-Path $ws "build") -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host " - $($_.FullName)" }
            exit 1
          }
          Write-Host "Found release dir: $($releaseDir.FullName)"
          Get-ChildItem -Path $releaseDir.FullName -Recurse | ForEach-Object { Write-Host " - $($_.FullName)" }

          $zipPath = Join-Path $ws "SMDB-Windows.zip"
          Compress-Archive -Path (Join-Path $releaseDir.FullName "*") -DestinationPath $zipPath -Force

          if (-not (Test-Path $zipPath)) {
            Write-Error "Zip file was not created at $zipPath"
            exit 1
          }
          $size = (Get-Item $zipPath).Length
          Write-Host "Created zip at $zipPath ($size bytes)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SMDB-Windows
          path: ${{ github.workspace }}\SMDB-Windows.zip
          if-no-files-found: error
          retention-days: 30
